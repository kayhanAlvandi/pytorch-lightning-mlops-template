services:
  mlflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mlflow
    container_name: mlflow_server
    command: >
              mlflow server
               --backend-store-uri sqlite:////mlflow.db
               --artifacts-destination /mlruns
               --host 0.0.0.0
               --port 5000
               --serve-artifacts
               --allowed-hosts '*'
    ports:
      - "5000:5000"
    volumes:
      - ../mlflow.db:/mlflow.db
      - ../mlruns:/mlruns
    restart: unless-stopped