_target_: src.datamodule.MultiChannelDataModule

batch_size: 64
num_workers: 0
pin_memory: true
use_mongodb: true
train_val_split: 0.5
max_wells_per_label: 2
exclude_wells:
  - ["MIG-Exp03-CP-40X-bin1X1", "K07"]
  - ["MIG-Exp03-CP-40X-bin1X1", "K08"]
  - ["MIG-Exp03-CP-40X-bin1X1", "K09"]

dataset:
  _target_: src.dataset.MultiChannelImageDataset
  root_dir: "O:\\BTSData\\MeasurementData\\MIG\\MIG-Exp03-CP-40X-bin1X1_20230831_143904\\MIG-Exp03-CP-40X-bin1X1"
  channels: [1, 2, 3, 4, 5]
  crop_size: 224

train_transform:
  - name: RandomCrop
    size: ${datamodule.dataset.crop_size}
  - name: GaussianBlur
    min_kernel: 3
    max_kernel: 7
    sigma: 1.0
    p: 0.3
  - name: RandomErasing
    p: 0.3
    scale: [0.02, 0.2]
    ratio: [0.3, 3.3]
    value: zero
  - name: Normalize

val_transform:
  - name: CenterCrop
    size: ${datamodule.dataset.crop_size}
  - name: Normalize
