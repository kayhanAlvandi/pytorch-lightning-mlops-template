- _target_: pytorch_lightning.callbacks.ModelCheckpoint
  dirpath: checkpoints
  filename: "cnn-{epoch:02d}-{val_acc:.4f}"
  monitor: "val/acc"
  mode: max
  save_top_k: 1
  save_last: true

- _target_: pytorch_lightning.callbacks.LearningRateMonitor
  logging_interval: epoch

- _target_: pytorch_lightning.callbacks.RichProgressBar

- _target_: src.callbacks.LogBestModelToMLflow
  artifact_path: best_model

# Early stopping with warmup - patience counting only starts after min_epochs
# min_epochs=50 ensures model trains 20 epochs after full unfreeze (epoch 30)
# - _target_: src.callbacks.EarlyStoppingWithWarmup
#   monitor: "val/loss"
#   min_epochs: 50
#   patience: 20
#   min_delta: 0.001
#   mode: min

# Gradual unfreezing schedule (epoch, num_stages_from_end)
#   0 = only head, -1 = all stages
# EfficientNet-B3 has 9 stages: stem, blocks.0-6, neck
- _target_: src.callbacks.GradualUnfreezing
  unfreeze_schedule:
    - [0,  0]      # Epochs 0-4:   head warmup (backbone frozen)
    - [5,  2]      # Epochs 5-14:  unfreeze last 2 stages (neck + blocks.6)
    - [15, 5]      # Epochs 15-29: unfreeze last 5 stages
    - [30, -1]     # Epoch 30+:    unfreeze all stages
