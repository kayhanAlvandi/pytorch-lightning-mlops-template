- _target_: pytorch_lightning.callbacks.ModelCheckpoint
  dirpath: checkpoints
  filename: "vit-{epoch:02d}-{val_acc:.4f}"
  monitor: "val/acc"
  mode: max
  save_top_k: 1
  save_last: true

- _target_: pytorch_lightning.callbacks.LearningRateMonitor
  logging_interval: epoch

- _target_: pytorch_lightning.callbacks.RichProgressBar

- _target_: src.callbacks.LogBestModelToMLflow
  artifact_path: best_model

## Early stopping
- _target_: pytorch_lightning.callbacks.EarlyStopping
  monitor: "val/loss"
  patience: 20
  min_delta: 0.001
  mode: min

# Auto gradual unfreezing for ViT
# ViT blocks are homogeneous (self-attention + FFN), so stage-by-stage
# unfreezing doesn't help as much as CNNs. Just: head -> all.
- _target_: src.callbacks.AutoGradualUnfreezing
  unfreeze_stages: [0, -1]
  monitor: val/loss
  patience: 5
  min_delta: 0.001
  mode: min
  min_epochs_per_stage: 3
