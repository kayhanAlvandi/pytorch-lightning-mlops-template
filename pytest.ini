[pytest]
testpaths = tests
norecursedirs = tests/diagnostics
python_files = test_*.py
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: end-to-end / integration tests that exercise training, checkpoints, or MLflow
    gpu: tests that require a CUDA device
addopts = -ra
